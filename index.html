<!doctype html>
<!-- lang="fr" : l'app est francophone par défaut (le sélecteur FR/EN met
     ensuite `document.documentElement.lang` à jour, cf. App.jsx). Avant, on
     déclarait `en` sur du contenu français : les navigateurs détectaient
     l'incohérence et déclenchaient leur TRADUCTION AUTOMATIQUE.

     translate="no" + meta notranslate : indispensables, pas cosmétiques.
     La traduction auto d'un navigateur remplace les nœuds de texte dans le
     DOM que React gère ; React tente ensuite de retirer des nœuds qui ont
     été échangés et lève `Failed to execute 'removeChild' on 'Node'`, ce qui
     démonte TOUT l'arbre → page blanche. Diagnostiqué le 2026-07-22 chez un
     utilisateur Edge/Windows via la télémétrie (table client_errors).
     Aucune perte pour l'utilisateur : l'app fournit déjà FR et EN nativement. -->
<html lang="fr" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <!-- Favicon PNG haute déf (960×960) : utilisé partout — onglets navigateur,
         signets, tuiles écran d'accueil iOS/Android. On expose plusieurs sizes
         pour que chaque OS pioche la déclinaison qu'il préfère. -->
    <link rel="icon" type="image/png" href="/favicon-v5.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon-v5.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-v2.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v2.png" />
    <!-- viewport-fit=cover : autorise le contenu à s'étendre derrière
         le notch / la dynamic island et la barre d'URL Safari, sinon
         iOS rend une bande de bg différent autour de la page. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- theme-color : couleur de la status bar mobile (notch, URL bar
         Safari) — matchée au bg du body (rgb(10, 11, 20)) pour que la
         couleur du fond couvre TOUT l'écran sans ligne de coupure. -->
    <meta name="theme-color" content="#0a0b14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Variante standard pour Chrome/Edge : l'apple-* est dépréciée côté
         Chromium mais toujours utilisée par Safari iOS, on garde les deux. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>VERSiONS</title>
    <!-- Meta Pixel — chargé en synchrone pour que fbq() soit dispo dès le
         premier render React. Le PageView initial est tiré ici (couvre le
         visiteur qui atterrit et part avant l'hydratation React). Les
         navigations SPA ré-émettent PageView via src/lib/pixel.js
         (cf. App.jsx, useEffect screen/popstate). Events custom :
         CompleteRegistration (signup) + LaunchAnalysis (nouvelle analyse). -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '2627344637716560');
      fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=2627344637716560&ev=PageView&noscript=1"
      alt="" /></noscript>
    <!-- End Meta Pixel -->
  </head>
  <!-- Fond sombre inline (2026-07-21) : appliqué AVANT tout CSS/JS pour
       qu'une panne de bundle ou un crash React ne produise jamais une
       page blanche (le fond de l'app est injecté par React sinon). -->
  <body style="background:#0a0b14">
    <!-- Footer statique : présent dans le HTML brut renvoyé par le
         serveur, lu par les crawlers qui n'exécutent pas le JS
         (Googlebot OAuth review notamment, plus basique que le
         crawler SEO classique). Sans ce bloc, Google ne trouve
         aucun lien vers /privacy ni /terms sur la home, ce qui
         bloque la validation OAuth.
         Retiré du DOM par main.jsx dès que React monte → invisible
         à l'usage normal (~150 ms de flash maximum). -->
    <div id="seo-static-footer" style="position:fixed;bottom:0;left:0;right:0;padding:14px;text-align:center;color:#fff;background:#0a0b14;font-family:system-ui,sans-serif;font-size:13px;z-index:0;">
      Versions — analyse audio IA · <a href="/privacy" style="color:#fff;text-decoration:underline;">Confidentialité</a> · <a href="/terms" style="color:#fff;text-decoration:underline;">CGU</a>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
